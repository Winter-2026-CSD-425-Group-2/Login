<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main>
    <section class="login-section">
      <h2>Reset Password</h2>

      <label>Email</label>
      <input type="text" id="email" />

      <button onclick="requestPasswordReset()">Send Reset OTP</button>
      <p><a href="login.html">Back to Login</a></p>
      <p><a href="register.html">Don't have an account? Register</a></p>

      <div id="resetSection" style="display:none; margin-top: 10px;">
        <label>OTP Code</label>
        <input type="text" id="otp" />

        <label>New Password</label>
        <input type="password" id="newPassword" />

        <button onclick="confirmPasswordReset()">Reset Password</button>
      </div>

      <p id="message"></p>
    </section>
  </main>

  <script src="authentication.js"></script>
  <script>
    function requestPasswordReset() {
      const email = document.getElementById("email").value.trim();
      const resetSection = document.getElementById("resetSection");

      if (!email) {
        if (typeof setMessage === 'function') setMessage("Please enter your email.", false);
        return;
      }

      if (typeof setMessage === 'function') setMessage("", true);
      if (resetSection) resetSection.style.display = "none";

      // Pretend backend logic exists for this route
      fetch(`${LAMBDA_URL}request-password-reset`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      })
        .then(res => res.json())
        .then(data => {
          if (typeof setMessage === 'function') setMessage(data.message || "", !!data.success);
          if (data.success && resetSection) {
            resetSection.style.display = "block";
          }
        })
        .catch(() => {
          if (typeof setMessage === 'function') setMessage("Server not reachable", false);
        });
    }

    function confirmPasswordReset() {
      const email = document.getElementById("email").value.trim();
      const code = document.getElementById("otp").value.trim();
      const newPassword = document.getElementById("newPassword").value;

      if (!email || !code || !newPassword) {
        if (typeof setMessage === 'function') setMessage("Please enter your email, OTP code, and a new password.", false);
        return;
      }

      // Pretend backend logic exists for this route
      fetch(`${LAMBDA_URL}reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, code, newPassword })
      })
        .then(res => res.json())
        .then(data => {
          if (typeof setMessage === 'function') setMessage(data.message || "", !!data.success);
          if (data.success) {
            const resetSection = document.getElementById("resetSection");
            if (resetSection) resetSection.style.display = "none";
          }
        })
        .catch(() => {
          if (typeof setMessage === 'function') setMessage("Server not reachable", false);
        });
    }
  </script>
</body>
</html>
